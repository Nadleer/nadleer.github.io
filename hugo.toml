# ─────────────────────────────────────────────────────────────
#  EDIT THIS LINE after you create the GitHub repo:
#  For a user site the repo MUST be named  <username>.github.io
#  and baseURL becomes  https://<username>.github.io/
baseURL = "https://nadleer.github.io/"
# ─────────────────────────────────────────────────────────────

title = "nadler // security research"
locale = "en-us"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
pygmentsUseClasses = true

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "nadler // security research"
  description = "Bug bounty findings, exploit write-ups, and offensive security notes."
  keywords = ["security", "bug bounty", "pentest", "appsec", "writeups", "infosec"]
  author = "nadler"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowToc = true
  TocOpen = false
  comments = false

  [params.homeInfoParams]
    Title = "nadler 👋"
    Content = """
Bug bounty hunter & penetration tester. I publish write-ups of vulnerabilities I find, offensive-security techniques, and recon/automation notes.

All findings are disclosed responsibly and only after the affected program has remediated or authorized disclosure.
"""

  [[params.socialIcons]]
    name = "hackerone"
    url = "https://hackerone.com/nadler"
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/nadleer"
  [[params.socialIcons]]
    name = "rss"
    url = "index.xml"

  [params.assets]
    disableHLJS = true
    favicon = "/images/favicon.ico"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10

[markup.highlight]
  noClasses = false
  codeFences = true
  guessSyntax = true
  lineNos = false
  style = "monokai"
